<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pinterest Style Art Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  background: black;
}

/* PINTEREST GRID */
.gallery {
  column-count: 4;
  column-gap: 15px;
  padding: 15px;
}

@media (max-width: 1000px) {
  .gallery { column-count: 3; }
}
@media (max-width: 700px) {
  .gallery { column-count: 2; }
}

/* CARD */
.card {
  background: #1a1a1a;
  margin-bottom: 15px;
  border-radius: 12px;
  overflow: hidden;
  display: inline-block;
  width: 100%;
}

/* IMAGE */
.card img {
  width: 100%;
  display: block;
}

/* TEXT */
.card-content {
  padding: 12px;
}

.card h3 {
  margin: 0;
  font-size: 16px;
}

.card p {
  font-size: 13px;
  color: #bbb;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>My Pinterest Art Gallery 💌</header>

<section class="gallery">

  <div class="card">
    <img src="https://picsum.photos/300/400">
    <div class="card-content">
      <h3>Soft Memories</h3>
      <p>This reminds me of quiet nights and feelings I never said.</p>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/500">
    <div class="card-content">
      <h3>Dream Light</h3>
      <p>Like chasing something beautiful but unreachable.</p>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/350">
    <div class="card-content">
      <h3>Lost Time</h3>
      <p>A moment that stayed longer than it should have.</p>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/450">
    <div class="card-content">
      <h3>Golden Silence</h3>
      <p>Sometimes silence says everything.</p>
    </div>
  </div>

</section>

</body>
</html>
